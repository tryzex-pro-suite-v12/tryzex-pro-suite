<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRYZEX - Retour Opérateur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- FIREBASE SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // TES CLES FIREBASE (Remplace bien VOTRE_NOUVELLE_CLE_API par ta vraie clé)
        const firebaseConfig = {
            apiKey: "AIzaSyCjfWQ1Vm5yr_QJyzS-78RDBhUqHDbqjWY",
            authDomain: "tryzex-professional-suite-v11.firebaseapp.com",
            projectId: "tryzex-professional-suite-v11",
            storageBucket: "tryzex-professional-suite-v11.firebasestorage.app",
            messagingSenderId: "212995727765",
            appId: "1:212995727765:web:ee2537763a1b8a9847569c"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.addEventListener('DOMContentLoaded', () => {
            // Lecture de l'ID depuis le QR Code (Ex: ?id=9999-1001)
            const urlParams = new URLSearchParams(window.location.search);
            const setupId = urlParams.get('id');

            const displayElement = document.getElementById('setupIdDisplay');
            const submitBtn = document.getElementById('submitBtn');

            if(setupId) {
                displayElement.innerHTML = `<i class="fa-solid fa-microchip mr-2"></i> RÉFÉRENCE : ${setupId}`;
            } else {
                // S'il n'y a pas d'ID, on affiche l'URL lue pour comprendre le bug
                displayElement.classList.replace('text-blue-400', 'text-red-400');
                displayElement.classList.replace('bg-slate-800', 'bg-red-900/30');
                displayElement.innerHTML = `⚠️ QR Code Invalide.<br><span class="text-[8px] text-slate-400 font-normal normal-case block mt-2">URL lue : ${window.location.href}</span>`;
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            }

            let compressedImage = null;

            document.getElementById('photoInput').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if(!file) return;
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let scale = 800 / img.width;
                        if(scale > 1) scale = 1;
                        canvas.width = img.width * scale;
                        canvas.height = img.height * scale;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        compressedImage = canvas.toDataURL('image/jpeg', 0.6); 
                        document.getElementById('previewImg').src = compressedImage;
                        document.getElementById('previewImg').classList.remove('hidden');
                        document.getElementById('photoLabel').innerText = "Photo ajoutée !";
                    }
                };
                reader.readAsDataURL(file);
            });

            document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                submitBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> ENVOI...`;
                submitBtn.disabled = true;
                
                try {
                    await addDoc(collection(db, "journal_atelier"), {
                        setupId: setupId,
                        operateur: document.getElementById('nom').value,
                        message: document.getElementById('message').value,
                        photo: compressedImage,
                        timestamp: serverTimestamp()
                    });
                    
                    document.getElementById('formContainer').innerHTML = `
                        <div class="text-center py-12">
                            <i class="fa-solid fa-check-circle text-6xl text-emerald-500 mb-4"></i>
                            <h2 class="text-2xl font-black text-white uppercase italic">Message Envoyé</h2>
                            <p class="text-slate-400 mt-2">Le bureau a reçu votre remarque en direct.</p>
                            <p class="text-[10px] text-slate-500 mt-6 uppercase">Vous pouvez fermer cette page.</p>
                        </div>
                    `;
                } catch (error) {
                    alert("Erreur réseau. Vérifiez votre connexion.");
                    submitBtn.innerText = "RÉESSAYER";
                    submitBtn.disabled = false;
                }
            });
        });
    </script>
</head>
<body class="bg-slate-950 text-white font-sans p-4 min-h-screen flex flex-col items-center justify-between">
    
    <div class="w-full max-w-md mt-4 mb-8 flex-grow flex flex-col">
        
        <!-- NOUVEAU LOGO TEXTE SANS FOND BLANC -->
        <div class="text-center mb-6">
            <!-- Ligne 1 : TRYZEX PROFESSIONAL SUITE -->
            <h1 class="text-[26px] sm:text-3xl font-black uppercase leading-none flex flex-wrap justify-center gap-1.5" style="transform: scaleY(1.1);">
                <span class="text-white tracking-tighter">TRYZEX</span>
                <span class="text-orange-500 tracking-tight">PROFESSIONAL SUITE</span>
            </h1>
            <!-- Ligne 2 : SETUP SHEET ADVANCED MODULE -->
            <p class="text-[11px] sm:text-xs text-slate-400 font-bold uppercase italic tracking-widest mt-2">
                Setup Sheet Advanced Module
            </p>
            <!-- Petit badge Liaison Atelier -->
            <div class="mt-4 inline-block bg-slate-900 border border-slate-800 px-4 py-1.5 rounded-full shadow-lg">
                <p class="text-[9px] text-orange-400 font-black uppercase tracking-[0.2em]">
                    <i class="fa-solid fa-satellite-dish mr-1 animate-pulse"></i> Liaison Atelier
                </p>
            </div>
        </div>

        <!-- FORMULAIRE -->
        <div id="formContainer" class="bg-slate-900 border border-slate-800 rounded-3xl shadow-2xl p-6 flex-grow">
            <div class="mb-6 border-b border-slate-800 pb-4 text-center">
                <p id="setupIdDisplay" class="bg-slate-800 text-blue-400 px-4 py-2 rounded-xl text-sm font-black uppercase inline-block w-full break-words"></p>
            </div>

            <form id="feedbackForm" class="space-y-5">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block tracking-widest">Nom de l'opérateur *</label>
                    <input type="text" id="nom" required placeholder="Nom & Prénom" class="w-full bg-slate-950 border border-slate-700 text-white rounded-xl p-4 font-bold text-sm outline-none focus:border-orange-500 transition">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block tracking-widest">Remarque / Alerte *</label>
                    <textarea id="message" required rows="4" placeholder="Tapez votre message ici..." class="w-full bg-slate-950 border border-slate-700 text-white rounded-xl p-4 font-bold text-sm outline-none focus:border-orange-500 transition"></textarea>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase mb-2 block tracking-widest">Preuve Visuelle (Optionnel)</label>
                    <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-slate-700 border-dashed rounded-xl cursor-pointer bg-slate-950 hover:bg-slate-800 transition">
                        <i class="fa-solid fa-camera text-2xl text-slate-400 mb-2"></i>
                        <p id="photoLabel" class="text-[10px] text-slate-300 font-bold uppercase tracking-widest">Toucher pour photographier</p>
                        <input id="photoInput" type="file" accept="image/*" capture="environment" class="hidden" />
                    </label>
                    <img id="previewImg" class="hidden mt-3 w-full h-48 object-cover rounded-xl border border-slate-700" />
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-orange-600 text-white font-black uppercase tracking-widest py-4 rounded-xl hover:bg-orange-500 shadow-[0_0_20px_rgba(234,88,12,0.3)] transition mt-4">
                    ENVOYER AU BUREAU
                </button>
            </form>
        </div>
    </div>

    <!-- FOOTER PETIT GRIS -->
    <div class="w-full text-center pb-2 shrink-0">
        <p class="text-[9px] text-slate-600 font-bold uppercase tracking-widest">
            TRYZEX Professional Suite V12 © 2026 M. ROMD | CODE#UP99
        </p>
    </div>

</body>
</html>
